<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SkyCast · Weather Stack App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b2b44 0%, #123e5e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      position: relative;
    }

    /* animated background subtle clouds */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(255,255,240,0.08) 0%, rgba(0,0,0,0.2) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .weather-card {
      max-width: 650px;
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.3) inset;
      overflow: hidden;
      transition: all 0.3s ease;
      z-index: 2;
    }

    /* header */
    .app-header {
      background: #1e2f3e;
      padding: 1.5rem 2rem;
      text-align: center;
      color: white;
    }

    .app-header h1 {
      font-weight: 600;
      font-size: 1.9rem;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .app-header h1 span {
      background: #ffb347;
      background: linear-gradient(135deg, #ffb347, #ff8c1a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: none;
    }

    .app-header p {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 6px;
    }

    /* search section */
    .search-section {
      padding: 1.8rem 2rem 1rem 2rem;
      background: rgba(248, 250, 252, 0.95);
    }

    .input-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 0.8rem;
    }

    .input-group input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 60px;
      font-size: 1rem;
      background: white;
      outline: none;
      transition: all 0.2s;
      color: #0f172a;
      font-weight: 500;
    }

    .input-group input:focus {
      border-color: #2c7da0;
      box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.2);
    }

    .input-group button {
      background: #1e4a6e;
      border: none;
      padding: 0 28px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.3px;
    }

    .input-group button:hover {
      background: #0f3b57;
      transform: scale(0.97);
    }

    .helper-text {
      font-size: 0.75rem;
      color: #4b5563;
      margin-left: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* error message */
    .error-msg {
      background: #fee2e2;
      color: #b91c1c;
      padding: 12px 18px;
      margin: 0 2rem 1rem 2rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 500;
      text-align: center;
      border-left: 5px solid #ef4444;
    }

    /* weather display */
    .weather-info {
      padding: 0rem 2rem 2rem 2rem;
    }

    .current-weather {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      padding: 1.5rem;
      margin-top: 0.5rem;
      transition: 0.2s;
    }

    .location-date {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      align-items: baseline;
      border-bottom: 2px dashed #e9eef3;
      padding-bottom: 12px;
      margin-bottom: 1.2rem;
    }

    .city-name {
      font-size: 1.8rem;
      font-weight: 800;
      color: #0b2b44;
      letter-spacing: -0.5px;
    }

    .date-time {
      font-size: 0.85rem;
      background: #eef2ff;
      padding: 6px 12px;
      border-radius: 40px;
      color: #1e3a5f;
      font-weight: 500;
    }

    .weather-temp {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin: 20px 0 15px;
    }

    .temp-big {
      font-size: 4rem;
      font-weight: 800;
      color: #0f2c3f;
      line-height: 1;
    }

    .temp-big span {
      font-size: 1.8rem;
      font-weight: 500;
    }

    .condition-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .condition-icon img {
      width: 70px;
      height: 70px;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
    }

    .condition-text {
      font-size: 1.2rem;
      font-weight: 600;
      text-transform: capitalize;
      color: #2c3e50;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 25px;
      background: #f8fafc;
      border-radius: 1.5rem;
      padding: 1rem;
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      padding: 10px 14px;
      border-radius: 1.2rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }

    .detail-icon {
      font-size: 1.6rem;
    }

    .detail-info {
      display: flex;
      flex-direction: column;
    }

    .detail-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 600;
      color: #5b6e8c;
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e293b;
    }

    .footer-note {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 1.2rem;
      color: #5d6f88;
      border-top: 1px solid #e2edf2;
      padding-top: 1rem;
    }

    @media (max-width: 520px) {
      .weather-temp {
        flex-direction: column;
        align-items: flex-start;
      }
      .city-name {
        font-size: 1.4rem;
      }
      .temp-big {
        font-size: 3rem;
      }
      .input-group {
        flex-direction: column;
      }
      .input-group button {
        justify-content: center;
        padding: 12px;
      }
      .search-section, .weather-info {
        padding-left: 1.2rem;
        padding-right: 1.2rem;
      }
    }
  </style>
</head>
<body>

<div class="weather-card">
  <div class="app-header">
    <h1>
      🌤️ Sky<span>Cast</span>
    </h1>
    <p>Real-time weather · Weather Stack API</p>
  </div>

  <div class="search-section">
    <div class="input-group">
      <input type="text" id="cityInput" placeholder="e.g., London, New York, Tokyo, Paris" value="New York">
      <button id="searchBtn">
        🔍 Get Weather
      </button>
    </div>
    <div class="helper-text">
      🌍 Enter city name or city, country (ex: London, UK)
      <span>⚡</span>
    </div>
  </div>

  <div id="errorContainer" class="error-msg" style="display: none;"></div>

  <div class="weather-info" id="weatherInfoArea">
    <!-- dynamic weather injected here -->
    <div class="current-weather" id="weatherCardDynamic">
      <div style="text-align: center; padding: 2rem 1rem; color: #3b5c7a;">
        🌎 Ready to check weather<br>
        <span style="font-size: 0.9rem;">Search any city above 🌦️</span>
      </div>
    </div>
    <div class="footer-note">
      Powered by Weatherstack API • Accurate & real-time
    </div>
  </div>
</div>

<script>
  // ----------------- WEATHER STACK API CONFIGURATION -----------------
  // IMPORTANT: Get your FREE API key from https://weatherstack.com/
  // Replace 'YOUR_API_KEY_HERE' with your actual Weatherstack API key.
  // The free tier allows up to 1000 requests/month, no backend needed.
  const WEATHERSTACK_API_KEY = "2e0183b4da32418b0751b167e8067915";   // <--- PASTE YOUR API KEY
  
  // DOM elements
  const cityInput = document.getElementById('cityInput');
  const searchBtn = document.getElementById('searchBtn');
  const errorContainer = document.getElementById('errorContainer');
  const weatherCardDynamic = document.getElementById('weatherCardDynamic');
  
  // Helper: show error message (auto hide after new search)
  function showError(message) {
    errorContainer.style.display = 'block';
    errorContainer.textContent = `⚠️ ${message}`;
    // auto hide after 5 sec? but better to clear when new request starts
  }
  
  function hideError() {
    errorContainer.style.display = 'none';
    errorContainer.textContent = '';
  }
  
  // Helper: format date from timestamp (unix or current local)
  function formatLocalDate() {
    const now = new Date();
    const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    return now.toLocaleDateString(undefined, options);
  }
  
  // Helper: get weather icon URL (weatherstack provides icon codes)
  // we use their official icon asset (if available) else fallback emoji logic
  function getWeatherIconUrl(weatherCode, isDay = true) {
    // Weatherstack returns weather_icons array or we can map condition text
    // we will later use the icon from API response directly (preferred)
    // but fallback if missing: nice emoji mapping
    return null; // will be handled inside render
  }
  
  // Main function to fetch weather using Weatherstack API
  async function fetchWeather(cityQuery) {
    if (!cityQuery.trim()) {
      showError("Please enter a city name.");
      return false;
    }
    
    // trim and encode URI component
    const query = encodeURIComponent(cityQuery.trim());
    // Weatherstack API endpoint (current weather)
    const apiUrl = `http://api.weatherstack.com/current?access_key=${WEATHERSTACK_API_KEY}&query=${query}&units=m`;
    
    // show loading state
    weatherCardDynamic.innerHTML = `
      <div style="text-align: center; padding: 2rem;">
        <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #1e4a6e; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 16px; color: #1e3a5f;">Fetching forecast for "${cityQuery.trim()}"...</p>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
      </div>
    `;
    hideError();
    
    try {
      const response = await fetch(apiUrl);
      const data = await response.json();
      
      // check for API error (success flag, or error object)
      if (!response.ok || data.success === false || data.error) {
        let errMsg = "Weather data unavailable. ";
        if (data.error && data.error.info) errMsg = data.error.info;
        else if (data.error && data.error.code) errMsg = `API Error: ${data.error.type}`;
        throw new Error(errMsg);
      }
      
      // validate if we have location and current data
      if (!data.location || !data.current) {
        throw new Error("Invalid response: missing location or current data.");
      }
      
      // render weather data
      renderWeatherData(data);
      return true;
    } catch (err) {
      console.error("Weatherstack fetch error:", err);
      let userMessage = "Could not fetch weather. ";
      if (err.message.includes("API Error") || err.message.includes("Invalid")) {
        userMessage = err.message;
      } else if (err.message.includes("Failed to fetch")) {
        userMessage = "Network error: Check your internet connection or API key restrictions (HTTP/HTTPS mixed content?). Weatherstack free plan requires HTTP or HTTPS? Ensure correct protocol. If using local file, CORS? But we use HTTP endpoint, may need allow. Also verify API key.";
      } else {
        userMessage = err.message || "City not found or API limit exceeded.";
      }
      showError(userMessage);
      // show fallback empty card
      weatherCardDynamic.innerHTML = `
        <div style="text-align: center; padding: 2rem; color: #a03e2c;">
          ❌ ${userMessage}<br>
          <span style="font-size:0.8rem;">💡 Tip: Use city name like "London" or "San Francisco".<br>Check your API key at weatherstack.com</span>
        </div>
      `;
      return false;
    }
  }
  
  // Render the beautiful UI with weather data
  function renderWeatherData(data) {
    const location = data.location;
    const current = data.current;
    
    // extract data fields
    const cityName = location.name || "Unknown";
    const country = location.country || "";
    const region = location.region ? `, ${location.region}` : "";
    const fullLocation = `${cityName}${region ? region : ''}${country ? `, ${country}` : ''}`;
    
    // temperature
    const tempC = current.temperature;
    const feelsLike = current.feelslike;
    const weatherDesc = current.weather_descriptions && current.weather_descriptions.length > 0 
                        ? current.weather_descriptions[0] 
                        : "Clear";
    const weatherIcon = current.weather_icons && current.weather_icons.length > 0 
                        ? current.weather_icons[0] 
                        : null;
    
    // additional details: humidity, wind speed, pressure, visibility, uv_index
    const humidity = current.humidity || "—";
    const windSpeed = current.wind_speed || 0;
    const windDir = current.wind_dir || "";
    const pressure = current.pressure || "—";
    const uvIndex = current.uv_index !== undefined ? current.uv_index : "—";
    const visibility = current.visibility || "—";
    const cloudcover = current.cloudcover || 0;
    
    // is day or night?
    const isDay = current.is_day === "yes" || current.is_day === true;
    const dayEmoji = isDay ? "☀️" : "🌙";
    
    // local observation time (provided by API)
    const observationTime = current.observation_time ? `Observed at ${current.observation_time} UTC` : "";
    const currentDateTime = formatLocalDate();
    
    // create HTML structure
    const weatherHtml = `
      <div class="current-weather" style="animation: fadeInUp 0.3s ease;">
        <div class="location-date">
          <div class="city-name">
            ${fullLocation} ${dayEmoji}
          </div>
          <div class="date-time">
            📅 ${currentDateTime}
          </div>
        </div>
        
        <div class="weather-temp">
          <div class="temp-big">
            ${tempC}°<span>C</span>
            <div style="font-size: 1rem; font-weight: normal; margin-top: 8px;">
              Feels like ${feelsLike}°C
            </div>
          </div>
          <div class="condition-icon">
            ${weatherIcon ? `<img src="${weatherIcon}" alt="${weatherDesc}" onerror="this.src=''; this.onerror=null; this.alt='${weatherDesc}'; this.style.width='60px';">` : `<div style="font-size: 3.2rem;">${getWeatherEmoji(weatherDesc, isDay)}</div>`}
            <div class="condition-text">${weatherDesc}</div>
          </div>
        </div>
        
        <div class="details-grid">
          <div class="detail-item">
            <div class="detail-icon">💧</div>
            <div class="detail-info">
              <span class="detail-label">Humidity</span>
              <span class="detail-value">${humidity}%</span>
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-icon">🌬️</div>
            <div class="detail-info">
              <span class="detail-label">Wind</span>
              <span class="detail-value">${windSpeed} km/h ${windDir ? windDir : ''}</span>
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-icon">⏲️</div>
            <div class="detail-info">
              <span class="detail-label">Pressure</span>
              <span class="detail-value">${pressure} mb</span>
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-icon">☁️</div>
            <div class="detail-info">
              <span class="detail-label">Cloud cover</span>
              <span class="detail-value">${cloudcover}%</span>
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-icon">🕶️</div>
            <div class="detail-info">
              <span class="detail-label">UV Index</span>
              <span class="detail-value">${uvIndex}</span>
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-icon">👁️</div>
            <div class="detail-info">
              <span class="detail-label">Visibility</span>
              <span class="detail-value">${visibility} km</span>
            </div>
          </div>
        </div>
        ${observationTime ? `<div style="font-size:0.7rem; text-align:right; margin-top: 10px; color:#6c86a3;">🕒 ${observationTime}</div>` : ''}
      </div>
    `;
    
    weatherCardDynamic.innerHTML = weatherHtml;
    // small style injection for fade-in if needed
    if (!document.querySelector('#fadeKeyframe')) {
      const styleSheet = document.createElement("style");
      styleSheet.id = "fadeKeyframe";
      styleSheet.textContent = `@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } } .current-weather { animation: fadeInUp 0.4s ease-out; }`;
      document.head.appendChild(styleSheet);
    }
  }
  
  // fallback emoji if weather icons fail to load
  function getWeatherEmoji(description, isDay) {
    const descLower = description.toLowerCase();
    if (descLower.includes('sun') || descLower.includes('clear')) return isDay ? "☀️" : "🌙";
    if (descLower.includes('cloud')) return "☁️";
    if (descLower.includes('rain') || descLower.includes('drizzle')) return "🌧️";
    if (descLower.includes('thunder')) return "⛈️";
    if (descLower.includes('snow')) return "❄️";
    if (descLower.includes('fog') || descLower.includes('mist')) return "🌫️";
    return "🌈";
  }
  
  // event listeners
  searchBtn.addEventListener('click', () => {
    const city = cityInput.value.trim();
    if (city === "") {
      showError("Please enter a city name before searching.");
      weatherCardDynamic.innerHTML = `<div class="current-weather" style="text-align:center; padding:2rem;">🔍 Enter a city name to see weather</div>`;
      return;
    }
    fetchWeather(city);
  });
  
  cityInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      searchBtn.click();
    }
  });
  
  // initial demo: load default city "New York" on page load if api key placeholder is not default?
  // but to avoid hitting invalid key we show welcome, but we still attempt if user sets real key.
  window.addEventListener('DOMContentLoaded', () => {
    // if API key is placeholder, display a gentle warning in console but still allow test
    if (WEATHERSTACK_API_KEY === "YOUR_API_KEY_HERE") {
      weatherCardDynamic.innerHTML = `
        <div class="current-weather" style="background: #fff7e0; text-align:center;">
          <div style="padding: 1.2rem;">
            ⚙️ <strong>API Key Required</strong><br>
            Get your free key from <a href="https://weatherstack.com/" target="_blank" style="color:#1e4a6e;">weatherstack.com</a><br>
            Then replace <code style="background:#eee;">YOUR_API_KEY_HERE</code> in the JavaScript section.<br><br>
            🌟 After adding key, search any city!
          </div>
        </div>
      `;
    } else {
      // optional: load default city (New York) automatically on start
      fetchWeather("New York").catch(e => console.log("initial fetch soft fail", e));
    }
    // extra note about protocol: Weatherstack supports both HTTP and HTTPS. free plan works on http.
    // If page is served via HTTPS, browser may block HTTP requests? We used http api endpoint; but for security many browsers block mixed content.
    // Therefore we detect protocol and show tip
    if (window.location.protocol === 'https:' && WEATHERSTACK_API_KEY !== "YOUR_API_KEY_HERE") {
      console.warn("⚠️ You are on HTTPS but calling HTTP API. Some browsers may block mixed content. Use HTTPS endpoint? Weatherstack requires paid plan for HTTPS. For demo, use HTTP if your page is served via HTTP or run locally.");
      const noteDiv = document.querySelector('.footer-note');
      if (noteDiv) {
        noteDiv.innerHTML = "🔒 Note: HTTPS + HTTP API may be blocked. For best results, test on localhost HTTP or enable mixed content. 🌐";
      }
    }
  });
</script>
</body>
</html>
